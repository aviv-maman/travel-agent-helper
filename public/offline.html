<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>אין חיבור · כלי עזר לסוכני נסיעות</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #0a0a0a;
        color: #ededed;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
      }
      .card { max-width: 22rem; }
      .icon {
        width: 72px; height: 72px; border-radius: 20px;
        display: grid; place-items: center; margin: 0 auto 20px;
        background: #2563eb;
      }
      .icon svg { width: 40px; height: 40px; fill: #fff; transform: rotate(45deg); }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p { color: #a1a1aa; line-height: 1.6; margin: 0 0 20px; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: #2563eb; color: #fff; font: inherit; font-weight: 600;
        padding: 10px 20px; border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
      </div>
      <h1>אין חיבור לאינטרנט</h1>
      <p>נראה שאתם במצב לא מקוון. בדקו את החיבור ונסו שוב.</p>
      <button onclick="location.reload()">נסו שוב</button>
    </div>
  </body>
</html>
